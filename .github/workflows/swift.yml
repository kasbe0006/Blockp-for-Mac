name: Swift Build & Test

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  build:
    name: Build & Test
    runs-on: macos-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up Swift
      uses: swift-actions/setup-swift@v1
      with:
        swift-version: '5.9'
    
    - name: Build debug
      run: swift build -c debug
    
    - name: Run self-test
      run: swift run blockpmac self-test
    
    - name: Build release
      run: swift build -c release
    
    - name: Verify app can launch
      run: |
        timeout 3 swift run BlockpMacApp 2>&1 || true
